<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Slider HTML and CSS | CodingNepal</title>
    <!-- Linking SwiperJS CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <link rel="stylesheet" href="css/home.css">
    <script src="js/main.js" defer></script>
</head>

<body>
    <main class="container swiper">
        <section class="slider-wrapper">

            <div class="swiper-wrapper">

                <div class="card-item swiper-slide">
                    <h2 class="user-name">Simple Card</h2>
                    <img src="" alt="Simple Card image" class="cards-image">
                    <a href="index.html"><button class="simple-card-btn demo-button">Veja a demonstração</button></a>
                </div>

                <div class="card-item swiper-slide">
                    <h2 class="user-name">Social Card</h2>
                    <img src="" alt="User Card image" class="cards-image">
                    <button class="social-card-btn demo-button">Veja a demonstração</button>
                </div>

                <div class="card-item swiper-slide">
                    <h2 class="user-name">Tech Card</h2>
                    <img src="" alt="Tech Card image" class="cards-image">
                    <button class="tech-card demo-button">Veja a demonstração</button>
                </div>

                <div class="card-item swiper-slide">
                    <h2 class="user-name">Comporative Card</h2>
                    <img src="" alt="Corporative Card image" class="cards-image">
                    <button class="corporative-card demo-button">Veja a demonstração</button>
                </div>

            </div>

            <div class="swiper-pagination"></div>
            <div class="swiper-slide-button swiper-button-prev"></div>
            <div class="swiper-slide-button swiper-button-next"></div>
        </section>
    </main>
    <!-- Linking SwiperJS script -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <!-- Linking custom script -->
    <script src="/js/home-slider.js"></script>
</body>

</html>
