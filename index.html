<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="<meta name="description" content="Escolha o card ideal para sua jornada. Selecione o tema desejado e visualize conteúdos personalizados na próxima tela de forma dinâmica e interativa.">
    <meta property="og:title" content="Escolha Seu Card | Experiência Personalizada">
    <!-- Linking SwiperJS CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <!-- Linking SwiperJS script -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="css/home.css">
    <script src="js/main.js" defer></script>
    <title>Selecione um Card | Personalize Sua Experiência</title>
</head>

<body>

    <main class="container swiper">

        <section class="slider-wrapper">

            <div class="swiper-wrapper">

                <div class="card-item swiper-slide">
                    <h2>Simple Card</h2>
                    <img src="" alt="Simple Card image" class="cards-image">
                    <button data-contexto="simple-card" class="simple-card-btn demo-button">Veja a demonstração</button>
                </div>

                <div class="card-item swiper-slide">
                    <h2>Social Card</h2>
                    <img src="" alt="User Card image" class="cards-image">
                    <button data-contexto="social-card" class="social-card-btn demo-button">Veja a demonstração</button>
                </div>

                <div class="card-item swiper-slide">
                    <h2>Tech Card</h2>
                    <img src="" alt="Tech Card image" class="cards-image">
                    <button data-contexto="tech-card" class="tech-card-btn demo-button">Veja a demonstração</button>
                </div>

                <div class="card-item swiper-slide">
                    <h2>Comporative Card</h2>
                    <img src="" alt="Corporative Card image" class="cards-image">
                    <button data-contexto="corporative-card" class="corporative-card-btn demo-button">Veja a demonstração</button>
                </div>

            </div>

            <div class="swiper-pagination"></div>
            <div class="swiper-slide-button swiper-button-prev"></div>
            <div class="swiper-slide-button swiper-button-next"></div>

        </section>

    </main>
</body>
</html>
